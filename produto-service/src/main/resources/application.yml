server:
  port: 8081

spring:
  application:
    name: produto-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/produto_db}
    username: ${SPRING_DATASOURCE_USERNAME:cardprocess}
    password: ${SPRING_DATASOURCE_PASSWORD:cardprocess}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
