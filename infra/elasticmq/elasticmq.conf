include classpath("application.conf")

# Queue URLs echo the hostname the client used (works for any docker network alias).
node-address {
  protocol = http
  host = "*"
  port = 9324
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

# Mirrors infra/localstack/init-sqs.sh: main queue with redrive to the DLQ after 5 receives.
queues {
  card-issuance-queue {
    defaultVisibilityTimeout = 30 seconds
    deadLettersQueue {
      name = "card-issuance-dlq"
      maxReceiveCount = 5
    }
  }
  card-issuance-dlq { }
}

# H2-backed persistence: queued and dead-lettered messages survive container restarts.
messages-storage {
  enabled = true
  uri = "jdbc:h2:/data/elasticmq"
}
